services:
  postgres:
    image: postgres:16-alpine
    container_name: avishu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: avishu_core
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - avishu_postgres_data:/var/lib/postgresql/data

volumes:
  avishu_postgres_data:
